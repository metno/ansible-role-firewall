---
driver:
  name: default
  options:
    managed: true
    login_cmd_template: "ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -l {user} {address}"

platforms:
  - name: firewall-noble
  - name: firewall-jammy
  - name: firewall-alma8
  - name: firewall-alma9
  - name: firewall-alma10

ansible:
  executor:
    backend: ansible-playbook
    args:
      ansible_playbook:
        - --inventory=${MOLECULE_SCENARIO_DIRECTORY}/inventory.yml
  env:
    ANSIBLE_FORCE_COLOR: true
  cfg:
    defaults:
      host_key_checking: false
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    prepare: prepare.yml

scenario:
  test_sequence:
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
